name: Deploy to S3 + CloudFront

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'content/**'
      - 'public/**'
      - 'global.css'
      - 'mdx-components.tsx'
      - 'next.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'postcss.config.js'
      - 'tailwind.config.js'
      - 'tsconfig.json'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
      - 'util/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    # id-token: write is required for GitHub OIDC authentication with AWS.
    # contents: read is needed for actions/checkout.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy-${{ github.run_id }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Validate & Deploy CDK (infra/)
        working-directory: infra
        run: |
          npm ci
          npx tsc --noEmit
          npx cdk synth
          npx cdk deploy --require-approval never

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Next.js static export)
        run: pnpm build

